name: release-formula
run-name: "release-formula | ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }} | ${{ github.sha }}"

# Syncs the Homebrew formula on a version tag. The formula lives in a SEPARATE
# tap repo (binlecode/homebrew-actop) so this code repo's `main` stays strictly
# PR-only — CI never pushes to it.
#
# One-time setup:
#   - Create repo binlecode/homebrew-actop with Formula/actop.rb.
#   - Add a fine-grained PAT as secret HOMEBREW_TAP_TOKEN on binlecode/actop,
#     scoped to binlecode/homebrew-actop with Contents: read/write.
#
# Users install with:  brew tap binlecode/actop && brew install actop
# (Homebrew maps the tap name binlecode/actop -> binlecode/homebrew-actop.)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to sync (for example: v1.0.0)"
        required: true
        type: string
      refresh_resources:
        description: "Refresh Python resources with brew update-python-resources"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: formula-sync-tap
  cancel-in-progress: false

jobs:
  sync-formula:
    runs-on: macos-latest

    steps:
      - name: Checkout source repo (read-only, for version validation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag and pyproject.toml version from tag commit
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG_NAME" ]; then
            echo "Invalid release tag: $TAG_NAME" >&2
            exit 1
          fi

          TAG_PYPROJECT="$(git show "${TAG_NAME}:pyproject.toml" 2>/dev/null || true)"
          if [ -z "$TAG_PYPROJECT" ]; then
            echo "Could not read pyproject.toml from tag ${TAG_NAME}" >&2
            exit 1
          fi

          PROJECT_VERSION="$(
            printf '%s\n' "$TAG_PYPROJECT" | awk '
              /^\[project\]/ { in_project=1; next }
              /^\[/ && in_project { in_project=0 }
              in_project && $1 == "version" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            '
          )"
          if [ -z "$PROJECT_VERSION" ]; then
            echo "Could not find [project].version in pyproject.toml at ${TAG_NAME}" >&2
            exit 1
          fi

          if [ "$PROJECT_VERSION" != "$VERSION" ]; then
            echo "Tag version ($VERSION) does not match pyproject.toml version ($PROJECT_VERSION)" >&2
            exit 1
          fi

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: binlecode/homebrew-actop
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Sync formula in tap repo
        env:
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          REFRESH_RESOURCES: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_resources }}
        run: |
          set -euo pipefail

          URL="https://github.com/${GH_REPO}/archive/refs/tags/${TAG_NAME}.tar.gz"
          SHA256="$(curl -fsSL "${URL}" | shasum -a 256 | awk '{print $1}')"

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          sed -E -i '' "s|^  url \".*\"$|  url \"${URL}\"|" Formula/actop.rb
          sed -E -i '' "s|^  sha256 \".*\"$|  sha256 \"${SHA256}\"|" Formula/actop.rb

          if [ "${REFRESH_RESOURCES}" = "true" ]; then
            TEMP_TAP="local/actop-ci"
            brew tap-new "${TEMP_TAP}" >/dev/null 2>&1 || true
            TAP_REPO="$(brew --repository "${TEMP_TAP}")"
            cp Formula/actop.rb "${TAP_REPO}/Formula/actop.rb"
            brew update-python-resources "${TEMP_TAP}/actop"
            cp "${TAP_REPO}/Formula/actop.rb" Formula/actop.rb
          else
            echo "Skipping Python resource refresh (workflow_dispatch refresh_resources=false)."
          fi

          if git diff --quiet -- Formula/actop.rb; then
            echo "Formula already up to date for ${TAG_NAME}."
            exit 0
          fi

          git add Formula/actop.rb
          git commit -m "actop: sync ${TAG_NAME}"
          git push origin HEAD
          echo "Formula sync pushed to tap repo."
