name: main-ci
run-name: "main-ci | ${{ github.ref_name }} | ${{ github.sha }}"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Match the Homebrew formula's python@3.13 (tap repo binlecode/homebrew-actop).
          python-version: "3.13"

      - name: Install project and dev tools
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install ruff pytest

      - name: Lint and format check
        run: |
          set -euo pipefail
          python -m ruff check .
          python -m ruff format --check .

      - name: Run CI-safe tests
        run: |
          set -euo pipefail
          python -m pytest -m "not local" -q

      - name: CLI smoke test
        run: python -m actop.actop --help
