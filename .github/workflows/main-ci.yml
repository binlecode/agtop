name: main-ci
run-name: "main-ci | ${{ github.ref_name }} | ${{ github.sha }}"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Tested versions. requires-python is uncapped (>=3.11); this matrix is
        # the set we actively verify. The Homebrew formula pins python@3.13.
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and dev tools
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install ruff pytest

      - name: Lint and format check
        run: |
          set -euo pipefail
          python -m ruff check .
          python -m ruff format --check .

      - name: Run CI-safe tests
        run: |
          set -euo pipefail
          python -m pytest -m "not local" -q

      - name: CLI smoke test
        run: python -m actop.actop --help

  # Non-blocking early warning: since requires-python is uncapped, test the next
  # (pre-release) CPython so we learn about breakage before it ships.
  canary-next-python:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up next Python (pre-release allowed)
        uses: actions/setup-python@v6
        with:
          python-version: "3.15"
          allow-prereleases: true

      - name: Install and run CI-safe tests
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pytest -m "not local" -q
          python -m actop.actop --help
